<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Special Letter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #fce4ec; /* Soft pink background */
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* වැටෙන හදවත් (Floating Hearts) */
        .heart {
            position: fixed;
            top: -1vh;
            transform: translateY(0);
            animation: fall 3s linear forwards;
            color: #e94560;
            z-index: 1000;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh);
            }
        }

        .letter-paper {
            background: white;
            width: 85%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 15px;
            position: relative;
            z-index: 10;
            animation: slideUp 1.2s ease-out;
            margin: 20px;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .couple-photo {
            width: 100%;
            height: auto;
            max-height: 300px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #e94560;
            font-size: 2.2rem;
            margin-bottom: 15px;
            text-align: center;
        }

        #message {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #444;
            min-height: 100px;
        }

        .footer {
            margin-top: 30px;
            font-family: 'Dancing Script', cursive;
            font-size: 1.6rem;
            color: #e94560;
            text-align: right;
        }

        /* --- Next Button එකේ Style --- */
        .btn-container {
            text-align: center;
            margin-top: 30px;
            /* ආරම්භයේදී හංගලා තියෙන්නේ */
            display: none; 
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .next-btn {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
            transition: transform 0.3s, background 0.3s;
        }

        .next-btn:hover {
            background: #d63d56;
            transform: scale(1.05);
        }

        .next-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="letter-paper">
        <img src="WhatsApp Image 2026-02-07 at 19.12.49.jpeg" alt="Our Memory" class="couple-photo">
        
        <h2>Happy Birthday, My Love! ❤️</h2>
        
        <div id="message"></div>

        <div class="footer">
            Always yours, <br>
            love
        </div>

        <div class="btn-container" id="nextBtnContainer">
            <a href="gallery.html" class="next-btn">Our Memories ❤️</a>
        </div>
    </div>

    <script>
        // ලිපියේ අන්තර්ගතය
        const text = `මේක මගෙන් ඔයාට ලැබෙන පුංචි surprise එකක්. 
        ඔයා මගේ ජීවිතේට ආපු එක ගැන මම හැමදාම සතුටු වෙනවා. 
        මේ උපන්දිනයේ ඉඳන් ඔයා දකින හැම හීනයක්ම සැබෑ වෙන්න කියලා මම හදවතින්ම ප්‍රාර්ථනා කරනවා. 
        මම හැමදාමත් ඔයාගෙ හෙවනැල්ල වගේ ලඟින් ඉන්නවා. 
        
        I love you more than words can say! ❤️✨`;

        let index = 0;
        const speed = 60;

        function typeEffect() {
            if (index < text.length) {
                let char = text.charAt(index);
                document.getElementById("message").innerHTML += char === '\n' ? '<br>' : char;
                index++;
                setTimeout(typeEffect, speed);
            } else {
                // ලිපිය ලියලා ඉවර වුණාම බටන් එක පෙන්වන්න
                document.getElementById("nextBtnContainer").style.display = "block";
            }
        }

        // හදවත් වැටෙන effect එක
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.opacity = Math.random();
            heart.style.fontSize = Math.random() * 10 + 10 + 'px';
            
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        window.onload = () => {
            typeEffect();
            setInterval(createHeart, 300);
        };
    </script>

</body>
</html>
