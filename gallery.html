<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            margin: 0;
            background: #fce4ec;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 10;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #e94560;
            font-size: 2.2rem;
            margin-bottom: 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .gallery-item {
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            height: 150px;
            transition: transform 0.2s;
        }

        .gallery-item:active { transform: scale(0.95); }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- Heart Modal Styling --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .heart-wrapper {
            position: relative;
            width: 250px;
            height: 220px;
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .heart-shape {
            position: absolute;
            width: 130px;
            height: 130px;
            background: #e94560;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -20%) rotate(-45deg);
            box-shadow: 0 10px 25px rgba(233, 69, 96, 0.4);
        }

        .heart-shape::before, .heart-shape::after {
            content: "";
            position: absolute;
            width: 130px;
            height: 130px;
            background: #e94560;
            border-radius: 50%;
        }

        .heart-shape::before { top: -65px; left: 0; }
        .heart-shape::after { top: 0; left: 65px; }

        .heart-content {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -20%);
            width: 180px;
            color: white;
            z-index: 2001;
            font-weight: 600;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.3;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        /* --- Cheers Text Styling (පෙට්ටියට යටින් background එකේ) --- */
        .cheers-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #e94560;
            margin-top: 30px;
            font-weight: bold;
            min-height: 70px;
            text-align: center;
            text-shadow: 0 0 10px rgba(233, 69, 96, 0.3);
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(233, 69, 96, 0.3); }
            to { text-shadow: 0 0 20px rgba(233, 69, 96, 0.6), 0 0 30px rgba(233, 69, 96, 0.4); }
        }

        .confetti {
            position: fixed;
            width: 8px;
            height: 8px;
            z-index: 3000;
            border-radius: 50%;
            animation: confetti-fall 3s linear forwards;
            pointer-events: none;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @keyframes pop {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Our Memories ❤️</h2>
    <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Tap each photo for a secret message! ✨</p>
    
    <div class="gallery-grid">
        <div class="gallery-item" onclick="showMsg('You are my whole world!🌍❤️')">
            <img src="WhatsApp Image 2025-12-28 at 17.03.30.jpeg">
        </div>
        <div class="gallery-item" onclick="showMsg('Keep smiling like this forever! 😊')">
            <img src="WhatsApp Image 2026-04-27 at 00.12.05.jpeg">
        </div>
        <div class="gallery-item" onclick="showMsg('I am so lucky to have you! ❤️')">
            <img src="WhatsApp Image 2025-12-28 at 17.03.31.jpeg">
        </div>
        <div class="gallery-item" onclick="showMsg('Our future will be even more beautiful! 💍')">
            <img src="IMG-20251211-WA0102.jpg">
        </div>
    </div>
</div>

<div id="cheersMessage" class="cheers-text"></div>

<div id="msgModal" class="modal" onclick="this.style.display='none'">
    <div class="heart-wrapper">
        <div class="heart-shape"></div>
        <div class="heart-content">
            <span id="wishText"></span>
        </div>
    </div>
</div>

<script>
    const cheersText = "Cheers for 28th 🥂✨";
    let cheersIndex = 0;
    let isTyping = false;

    function typeCheers() {
        if (cheersIndex < cheersText.length) {
            document.getElementById("cheersMessage").innerHTML += cheersText.charAt(cheersIndex);
            cheersIndex++;
            setTimeout(typeCheers, 120);
        }
    }

    function burstConfetti() {
        for (let i = 0; i < 60; i++) {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            const colors = ['#e94560', '#f2d74e', '#95e1d3', '#f38181', '#ffffff', '#ffcead'];
            confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.top = '-5vh';
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            confetti.style.opacity = Math.random();
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3500);
        }
    }

    function showMsg(text) {
        document.getElementById('wishText').innerText = text;
        document.getElementById('msgModal').style.display = 'flex';
        
        if (!isTyping) {
            isTyping = true;
            typeCheers();
        }
        burstConfetti();
    }
</script>

</body>
</html>
