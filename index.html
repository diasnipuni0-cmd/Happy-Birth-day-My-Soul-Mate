<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday My Love</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            color: white;
            text-align: center;

            /* පසුබිම් පින්තූරය */
            background-image: url("IMG-20250325-WA0020 (1).jpg"); 
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-size: cover; 
            background-position: center 30%; /* Laptop එකේදී පෙනුම පාලනය කිරීමට */
            background-color: #000;
        }

        /* --- මැද තියෙන වීදුරු පෙට්ටිය (Glass Box) --- */
        .container {
            background: rgba(255, 255, 255, 0.1); 
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 85%;
            max-width: 400px;
            position: relative;
            z-index: 5;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: #f0f0f0;
        }

        /* --- හෘදයාකාර Button එක --- */
        .heart-btn {
            position: relative;
            width: 130px;
            height: 120px;
            margin: 30px auto 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            cursor: pointer;
            animation: heartBeat 1.2s infinite; 
            filter: drop-shadow(0px 8px 15px rgba(233, 69, 96, 0.4));
        }

        .heart-btn::before,
        .heart-btn::after {
            content: "";
            position: absolute;
            top: 0;
            width: 70px;
            height: 110px;
            border-radius: 50px 50px 0 0;
            background: #e94560;
        }

        .heart-btn::before {
            left: 65px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart-btn::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .heart-text {
            position: absolute;
            z-index: 10;
            color: white;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
            top: 30px;
            width: 90px;
            pointer-events: none;
        }

        /* --- Phone එක සඳහා (Mobile Responsive) --- */
        @media (max-width: 600px) {
            body {
                background-position: center 15%; /* මුහුණු කැපෙන්නේ නැති වෙන්න පල්ලෙහාට ගත්තා */
            }

            .container {
                width: 80%;
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.6rem;
            }

            p {
                font-size: 0.9rem;
            }

            .heart-btn {
                width: 110px;
                height: 100px;
            }

            .heart-btn::before,
            .heart-btn::after {
                width: 60px;
                height: 95px;
            }
            
            .heart-btn::before { left: 55px; }

            .heart-text {
                font-size: 14px;
                top: 25px;
                width: 80px;
            }
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Happy Birthday My Soul Mate! ❤️</h1>
        <p>I built something special just for you...</p>
        
        <a href="memories.html" class="heart-btn">
            <span class="heart-text">Open<br>Your Gift</span>
        </a>
    </div>
</body>
</html>
